model_list:
  # ============================================
  # FREE CLOUD OPTIONS (RECOMMENDED - no local resources needed)
  # ============================================

  # Groq - FREE tier, VERY FAST (500 tokens/sec!)
  # Get free API key: https://console.groq.com/keys
  # This is the BEST free option - runs Llama 3.1 in the cloud
  - model_name: gpt-4o-mini  # Alias so agents work without code changes
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: os.environ/GROQ_API_KEY

  - model_name: groq-llama
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: os.environ/GROQ_API_KEY

  - model_name: groq-llama-70b
    litellm_params:
      model: groq/llama-3.1-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  - model_name: groq-mixtral
    litellm_params:
      model: groq/mixtral-8x7b-32768
      api_key: os.environ/GROQ_API_KEY

  # ============================================
  # LOCAL OPTIONS (if you have resources)
  # ============================================

  # Ollama - FREE, runs locally on your Mac
  # Only use if you have RAM/disk space
  - model_name: llama3
    litellm_params:
      model: ollama/llama3.2
      api_base: os.environ/OLLAMA_API_BASE

  - model_name: llama3.2
    litellm_params:
      model: ollama/llama3.2
      api_base: os.environ/OLLAMA_API_BASE

  # ============================================
  # CHEAP CLOUD OPTIONS (for testing)
  # ============================================

  # GPT-4o-mini - $0.15/1M input, $0.60/1M output
  # Good balance of cheap + capable
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # Gemini 2.0 Flash - FREE tier available
  # Get free API key: https://aistudio.google.com
  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_API_KEY

  - model_name: gemini-1.5-flash
    litellm_params:
      model: gemini/gemini-1.5-flash
      api_key: os.environ/GOOGLE_API_KEY

  # DeepSeek - $0.14/1M input, $0.28/1M output
  - model_name: deepseek
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY

  # ============================================
  # PREMIUM OPTIONS (for customer demos)
  # ============================================

  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: claude-3-5-sonnet
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022
      api_key: os.environ/ANTHROPIC_API_KEY

litellm_settings:
  drop_params: true
  set_verbose: false
  # Default to cheapest model
  default_model: gpt-4o-mini

general_settings:
  master_key: "sk-simulation-key"
