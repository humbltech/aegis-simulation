model_list:
  # OpenAI models (if OPENAI_API_KEY is set)
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # Anthropic models (if ANTHROPIC_API_KEY is set)
  - model_name: claude-3-5-sonnet
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022
      api_key: os.environ/ANTHROPIC_API_KEY

  # Fallback: Mock responses for testing without API keys
  - model_name: mock
    litellm_params:
      model: openai/gpt-3.5-turbo
      mock_response: "This is a mock response for testing."

litellm_settings:
  drop_params: true
  set_verbose: false

general_settings:
  master_key: "sk-simulation-key"
